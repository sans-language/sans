<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; connect-src 'self' https://api.sans.dev; font-src 'self'">
  <meta name="sans-version" content="0.9.0">
  <title>Sans Playground</title>
  <script>
    (function(){var t=localStorage.getItem('sans-theme');if(t)document.documentElement.setAttribute('data-theme',t);else if(matchMedia('(prefers-color-scheme:dark)').matches)document.documentElement.setAttribute('data-theme','dark');})();
  </script>
  <link rel="stylesheet" href="/css/style.css">
  <script src="/js/components.js" defer></script>
  <style>
    .playground { max-width: 960px; margin: 32px auto; padding: 0 16px; }

    /* Editor container — overlay approach */
    .editor-wrap {
      position: relative;
      border: 1px solid #334155;
      border-radius: 8px;
      overflow: hidden;
      background: #1e293b;
    }
    .editor-titlebar { display: none; }

    .editor-body {
      position: relative;
      min-height: 400px;
      height: 400px;
      resize: vertical;
      overflow: hidden;
    }

    /* Hidden textarea that captures input */
    #editor {
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 100%;
      font-family: 'Source Code Pro', monospace;
      font-size: 13px;
      line-height: 1.4;
      padding: 12px 16px 12px 62px;
      background: transparent;
      color: transparent;
      caret-color: #e2e8f0;
      border: none;
      outline: none;
      resize: none;
      tab-size: 4;
      white-space: pre;
      overflow: auto;
      z-index: 2;
      -webkit-text-fill-color: transparent;
    }

    /* Highlighted overlay */
    #highlight {
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 100%;
      font-family: 'Source Code Pro', monospace;
      font-size: 13px;
      line-height: 1.4;
      padding: 12px 16px 12px 62px;
      color: #e2e8f0;
      pointer-events: none;
      white-space: pre;
      overflow: auto;
      z-index: 1;
    }

    /* Line numbers gutter */
    #line-numbers {
      position: absolute;
      top: 0; left: 0;
      width: 48px;
      height: 100%;
      padding: 12px 10px 12px 0;
      text-align: right;
      font-family: 'Source Code Pro', monospace;
      font-size: 13px;
      color: #475569;
      background: #0f172a;
      border-right: 1px solid #334155;
      user-select: none;
      pointer-events: none;
      z-index: 3;
      overflow: hidden;
    }
    #line-numbers div {
      line-height: 1.4;
    }

    /* Sync scroll between textarea and overlay */
    #editor:focus ~ #highlight { /* keep in sync via JS */ }

    .playground-controls {
      display: flex;
      gap: 8px;
      margin: 12px 0;
      align-items: center;
    }
    .playground-controls .btn-primary,
    .playground-controls .btn-secondary {
      padding: 8px 20px;
      font-size: 14px;
    }
    .playground-controls .shortcut {
      color: var(--subtext0);
      font-size: 12px;
      margin-left: 4px;
    }
    @media (max-width: 768px) {
      .editor-body { min-height: 300px; }
      #editor, #highlight { font-size: 12px; padding: 10px 12px 10px 50px; }
      #line-numbers { width: 38px; font-size: 12px; padding: 10px 6px 10px 0; }
      .playground-output { font-size: 12px; }
    }
    .playground-output {
      font-family: 'Source Code Pro', monospace;
      font-size: 13px;
      line-height: 1.5;
      padding: 16px;
      border: 1px solid #334155;
      border-radius: 8px;
      background: #0f172a;
      color: #e2e8f0;
      min-height: 80px;
      white-space: pre-wrap;
      word-break: break-all;
    }
    .playground-output .error { color: #f87171; }
    .playground-output .success { color: #34d399; }
    .playground-spinner { color: #94a3b8; }
    .playground-status { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
    .playground-status h3 { margin: 0; }
  </style>
</head>
<body>
  <sans-nav active="playground" base=""></sans-nav>

  <div class="playground">
    <h1>Sans Playground</h1>
    <p style="color:var(--subtext0); margin-bottom:16px;">Write Sans code and run it instantly. No installation required.</p>

    <div class="editor-wrap">
      <div class="editor-body">
        <div id="line-numbers"></div>
        <textarea id="editor" spellcheck="false">fib(n:I) I = n &lt;= 1 ? n : fib(n-1) + fib(n-2)

main() I {
    p("Hello from Sans!")

    nums = [1 2 3 4 5]
    doubled = nums.map(|x:I| I { x * 2 })
    p(doubled)

    p("fib(10) = {fib(10)}")
    0
}</textarea>
        <div id="highlight"></div>
      </div>
    </div>

    <div class="playground-controls">
      <button id="run-btn" class="btn-primary" onclick="runCode()">Run</button>
      <span class="shortcut">Ctrl+Enter</span>
      <button class="btn-secondary" onclick="shareCode()">Share</button>
      <button class="btn-secondary" onclick="resetCode()">Reset</button>
    </div>

    <div class="playground-status">
      <h3>Output</h3>
      <span id="status"></span>
    </div>
    <div id="output" class="playground-output">Press Run to execute your code.</div>
  </div>

  <sans-footer base=""></sans-footer>

  <script>
    const API = 'https://api.sans.dev';

    // Fix the HTML entities in the textarea default value
    const editorEl = document.getElementById('editor');
    editorEl.value = editorEl.value.replace(/&lt;/g, '<').replace(/&gt;/g, '>').replace(/&amp;/g, '&');
    const DEFAULT_CODE = editorEl.value;

    // Sans syntax highlighter
    function highlightSans(code) {
      const esc = code.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
      return esc
        // Strings (double-quoted)
        .replace(/"([^"\\]|\\.)*"/g, '<span style="color:#34d399">$&</span>')
        // Comments
        .replace(/(\/\/.*)$/gm, '<span style="color:#64748b;font-style:italic">$1</span>')
        // Numbers
        .replace(/\b(\d+\.?\d*)\b/g, '<span style="color:#fb923c">$1</span>')
        // Keywords
        .replace(/\b(if|else|while|for|in|match|return|break|continue|struct|enum|trait|impl|fn|let|import|pub|spawn|main|true|false)\b/g, '<span style="color:#c084fc">$1</span>')
        // Types
        .replace(/\b(I|F|B|S|J|R|O|M|Array|Map|String|Int|Float|Bool|Result|Option|HttpServer|HttpRequest|HttpResponse|Sender|Receiver|Mutex|JoinHandle|dyn)\b/g, '<span style="color:#fbbf24">$1</span>')
        // Built-in functions
        .replace(/\b(p|str|stoi|itof|ftoi|ftos|range|sleep|time|now|random|rand|fr|fw|fa|fe|jp|jfy|jo|ja|js|ji|jb|jn|hg|hp|ok|err|some|none|assert|assert_eq|assert_ne|serve|listen|channel|mutex|fptr|spawn)\b(?=\s*\()/g, '<span style="color:#60a5fa">$1</span>');
    }

    function updateHighlight() {
      const code = editorEl.value;
      document.getElementById('highlight').innerHTML = highlightSans(code) + '\n';
      updateLineNumbers();
      syncScroll();
    }

    function updateLineNumbers() {
      const lines = editorEl.value.split('\n').length;
      const nums = [];
      for (let i = 1; i <= lines; i++) nums.push('<div>' + i + '</div>');
      document.getElementById('line-numbers').innerHTML = nums.join('');
    }

    function syncScroll() {
      const hl = document.getElementById('highlight');
      const ln = document.getElementById('line-numbers');
      hl.scrollTop = editorEl.scrollTop;
      hl.scrollLeft = editorEl.scrollLeft;
      ln.scrollTop = editorEl.scrollTop;
    }

    editorEl.addEventListener('input', updateHighlight);
    editorEl.addEventListener('scroll', syncScroll);
    editorEl.addEventListener('keydown', function(e) {
      if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') {
        e.preventDefault();
        runCode();
      }
      if (e.key === 'Tab') {
        e.preventDefault();
        const start = this.selectionStart;
        this.value = this.value.substring(0, start) + '    ' + this.value.substring(this.selectionEnd);
        this.selectionStart = this.selectionEnd = start + 4;
        updateHighlight();
      }
    });

    // Initial render
    updateHighlight();

    // Load snippet from URL query param (?s=ID) or path (/play/ID)
    (function() {
      const params = new URLSearchParams(window.location.search);
      let id = params.get('s');
      if (!id) {
        const path = window.location.pathname.replace(/\/$/, '');
        const parts = path.split('/');
        const last = parts[parts.length - 1];
        if (last && last !== 'play' && last.length === 8) id = last;
      }
      if (id && /^[a-zA-Z0-9]{8}$/.test(id)) {
        fetch(API + '/api/snippet/' + id)
          .then(r => r.ok ? r.json() : Promise.reject())
          .then(data => { editorEl.value = data.code; updateHighlight(); })
          .catch(() => {
            document.getElementById('output').innerHTML = '<span class="error">Snippet not found. Loading default example.</span>';
          });
      }
    })();

    async function runCode() {
      const code = editorEl.value;
      const output = document.getElementById('output');
      const status = document.getElementById('status');
      const btn = document.getElementById('run-btn');

      btn.disabled = true;
      btn.textContent = 'Running...';
      output.innerHTML = '<span class="playground-spinner">Compiling and running...</span>';
      status.textContent = '';

      try {
        const res = await fetch(API + '/api/run', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ code }),
        });

        if (res.status === 429) {
          output.innerHTML = '<span class="error">Rate limit exceeded. Please wait a moment.</span>';
          return;
        }

        const data = await res.json();
        let html = '';
        if (data.stderr) {
          html += '<span class="error">' + escapeHtml(data.stderr) + '</span>\n';
        }
        if (data.stdout) {
          html += '<span class="success">' + escapeHtml(data.stdout) + '</span>';
        }
        if (!data.stdout && !data.stderr) {
          html = '<span class="success">(no output)</span>';
        }
        output.innerHTML = html;
        status.textContent = data.compile_success ? 'Compiled OK' : 'Compile error';
        status.style.color = data.compile_success ? '#34d399' : '#f87171';
      } catch (e) {
        output.innerHTML = '<span class="error">Failed to connect to playground server.</span>';
      } finally {
        btn.disabled = false;
        btn.textContent = 'Run';
      }
    }

    async function shareCode() {
      const code = editorEl.value;
      try {
        const res = await fetch(API + '/api/share', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ code }),
        });
        const data = await res.json();
        const url = window.location.origin + '/play/' + data.id;
        window.history.pushState({}, '', '/play/?s=' + data.id);
        navigator.clipboard.writeText(url).then(() => {
          document.getElementById('status').textContent = 'Link copied!';
          document.getElementById('status').style.color = '#34d399';
        });
      } catch (e) {
        document.getElementById('status').textContent = 'Share failed';
        document.getElementById('status').style.color = '#f87171';
      }
    }

    function resetCode() {
      editorEl.value = DEFAULT_CODE;
      updateHighlight();
      document.getElementById('output').textContent = 'Press Run to execute your code.';
      document.getElementById('status').textContent = '';
      window.history.pushState({}, '', '/play/');
      updateHighlight();
    }

    function escapeHtml(s) {
      return s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
    }
  </script>
</body>
</html>
