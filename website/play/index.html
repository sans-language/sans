<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; connect-src 'self' https://api.sans.dev; font-src 'self'">
  <meta name="sans-version" content="0.9.2">
  <title>Sans Playground</title>
  <script src="/js/theme.js"></script>
  <link rel="stylesheet" href="/css/style.css">
  <script src="/js/components.js" defer></script>
  <style>
    .playground { max-width: 960px; margin: 32px auto; padding: 0 16px; }

    /* Editor container — overlay approach */
    .editor-wrap {
      position: relative;
      border: 1px solid #334155;
      border-radius: 8px;
      overflow: hidden;
      background: #1e293b;
    }
    .editor-titlebar { display: none; }

    .editor-body {
      position: relative;
      min-height: 400px;
      height: 400px;
      resize: vertical;
      overflow: hidden;
    }

    /* Hidden textarea that captures input */
    #editor {
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 100%;
      font-family: 'Source Code Pro', monospace;
      font-size: 13px;
      line-height: 1.4;
      padding: 12px 16px 12px 62px;
      background: transparent;
      color: transparent;
      caret-color: #e2e8f0;
      border: none;
      outline: none;
      resize: none;
      tab-size: 4;
      white-space: pre;
      overflow: auto;
      z-index: 2;
      -webkit-text-fill-color: transparent;
    }

    /* Highlighted overlay */
    #highlight {
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 100%;
      font-family: 'Source Code Pro', monospace;
      font-size: 13px;
      line-height: 1.4;
      padding: 12px 16px 12px 62px;
      color: #e2e8f0;
      pointer-events: none;
      white-space: pre;
      overflow: auto;
      z-index: 1;
    }

    /* Line numbers gutter */
    #line-numbers {
      position: absolute;
      top: 0; left: 0;
      width: 48px;
      height: 100%;
      padding: 12px 10px 12px 0;
      text-align: right;
      font-family: 'Source Code Pro', monospace;
      font-size: 13px;
      color: #475569;
      background: #0f172a;
      border-right: 1px solid #334155;
      user-select: none;
      pointer-events: none;
      z-index: 3;
      overflow: hidden;
    }
    #line-numbers div {
      line-height: 1.4;
    }

    /* Sync scroll between textarea and overlay */
    #editor:focus ~ #highlight { /* keep in sync via JS */ }

    .playground-controls {
      display: flex;
      gap: 8px;
      margin: 12px 0;
      align-items: center;
    }
    .playground-controls .btn-primary,
    .playground-controls .btn-secondary {
      padding: 8px 20px;
      font-size: 14px;
    }
    .playground-controls .shortcut {
      color: var(--subtext0);
      font-size: 12px;
      margin-left: 4px;
    }
    @media (max-width: 768px) {
      .editor-body { min-height: 300px; }
      #editor, #highlight { font-size: 12px; padding: 10px 12px 10px 50px; }
      #line-numbers { width: 38px; font-size: 12px; padding: 10px 6px 10px 0; }
      .playground-output { font-size: 12px; }
    }
    .playground-output {
      font-family: 'Source Code Pro', monospace;
      font-size: 13px;
      line-height: 1.5;
      padding: 16px;
      border: 1px solid #334155;
      border-radius: 8px;
      background: #0f172a;
      color: #e2e8f0;
      min-height: 80px;
      white-space: pre-wrap;
      word-break: break-all;
    }
    .playground-output .error { color: #f87171; }
    .playground-output .success { color: #34d399; }
    .playground-spinner { color: #94a3b8; }
    .playground-status { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
    .playground-status h3 { margin: 0; }
  </style>
</head>
<body>
  <sans-nav active="playground" base=""></sans-nav>

  <div class="playground">
    <h1>Sans Playground</h1>
    <p style="color:var(--subtext0); margin-bottom:16px;">Write Sans code and run it instantly. No installation required.</p>

    <div class="editor-wrap">
      <div class="editor-body">
        <div id="line-numbers"></div>
        <textarea id="editor" spellcheck="false">fib(n:I) I = n &lt;= 1 ? n : fib(n-1) + fib(n-2)

main() I {
    p("Hello from Sans!")

    nums = [1 2 3 4 5]
    doubled = nums.map(|x:I| I { x * 2 })
    p(doubled)

    p("fib(10) = {fib(10)}")
    0
}</textarea>
        <div id="highlight"></div>
      </div>
    </div>

    <div class="playground-controls">
      <button id="run-btn" class="btn-primary" onclick="runCode()">Run</button>
      <span class="shortcut">Ctrl+Enter</span>
      <button class="btn-secondary" onclick="shareCode()">Share</button>
      <button class="btn-secondary" onclick="resetCode()">Reset</button>
    </div>

    <div class="playground-status">
      <h3>Output</h3>
      <span id="status"></span>
    </div>
    <div id="output" class="playground-output">Press Run to execute your code.</div>
  </div>

  <sans-footer base=""></sans-footer>

  <script src="/js/playground.js"></script>
</body>
</html>
