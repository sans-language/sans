name: Test

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  test-macos:
    name: Test (macOS ARM64)
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Install LLVM 17
        run: brew install llvm@17

      - name: Download bootstrap compiler
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Use v0.6.1 as bootstrap — recent enough to know all current builtins.
          # v0.4.0 is too old (missing getenv, stof, etc.)
          curl -fsSL "https://github.com/${{ github.repository }}/releases/download/v0.6.1/sans-macos-arm64.tar.gz" | tar xz
          chmod +x sans
          mv sans sans-bootstrap
          ./sans-bootstrap --version

      - name: Build compiler
        run: |
          export PATH="/opt/homebrew/opt/llvm@17/bin:/usr/local/opt/llvm@17/bin:$PATH"
          ./sans-bootstrap build compiler/main.sans

      - name: Run tests
        run: bash tests/run_tests.sh

      - name: Generate .ll files for Linux cross-build
        run: |
          export PATH="/opt/homebrew/opt/llvm@17/bin:/usr/local/opt/llvm@17/bin:$PATH"
          # The compiler deletes .ll files after llc runs via sys("rm -f ...").
          # sys() calls libc system() which spawns /bin/sh -c "rm ...", inheriting
          # our PATH. Wrap rm to copy .ll files before deleting.
          mkdir -p ll-output /tmp/wrap
          cat > /tmp/wrap/rm << 'WRAPPER'
          #!/bin/bash
          for f in "$@"; do
            [[ "$f" == *.ll ]] && cp "$f" "$SANS_LL_OUTPUT/" 2>/dev/null
          done
          exec /bin/rm "$@"
          WRAPPER
          chmod +x /tmp/wrap/rm
          export SANS_LL_OUTPUT="$(pwd)/ll-output"
          export PATH="/tmp/wrap:$PATH"
          ./compiler/main build compiler/main.sans 2>&1 || true
          echo "Generated .ll files:"
          ls -la ll-output/
          # If main.ll wasn't captured (sys() might bypass PATH), generate it
          if [ ! -f ll-output/main.ll ]; then
            echo "main.ll not captured by wrapper, re-generating..."
            # The compiler writes main.ll then immediately runs llc and rm.
            # Run build in background, watch for the file, copy it.
            ./compiler/main build compiler/main.sans &
            BUILD_PID=$!
            while [ ! -f compiler/main.ll ] && kill -0 $BUILD_PID 2>/dev/null; do sleep 0.01; done
            [ -f compiler/main.ll ] && cp compiler/main.ll ll-output/
            wait $BUILD_PID 2>/dev/null || true
            ls -la ll-output/
          fi

      - name: Upload .ll artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ll-files
          path: ll-output/

  test-linux:
    name: Test (Linux x86_64)
    needs: test-macos
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install LLVM 17 and dependencies
        run: |
          wget -qO- https://apt.llvm.org/llvm-snapshot.gpg.key | sudo tee /etc/apt/keyrings/llvm.asc
          echo "deb [signed-by=/etc/apt/keyrings/llvm.asc] http://apt.llvm.org/jammy/ llvm-toolchain-jammy-17 main" | sudo tee /etc/apt/sources.list.d/llvm-17.list
          sudo apt-get update
          sudo apt-get install -y llvm-17 libcurl4-openssl-dev libssl-dev pkg-config zlib1g-dev

      - name: Download .ll artifacts
        uses: actions/download-artifact@v4
        with:
          name: ll-files
          path: ll-output/

      - name: Compile from LLVM IR
        run: |
          export PATH="/usr/lib/llvm-17/bin:$PATH"
          echo "=== .ll files ==="
          ls -la ll-output/
          # Compile main .ll to object
          llc -filetype=obj -O2 --relocation-model=pic -o main.o ll-output/main.ll
          # Compile each runtime .ll to object
          RUNTIME_OBJS=""
          for ll in ll-output/sans_*_runtime.ll; do
            base=$(basename "$ll" .ll)
            llc -filetype=obj -O2 --relocation-model=pic -o "/tmp/${base}.o" "$ll"
            RUNTIME_OBJS="$RUNTIME_OBJS /tmp/${base}.o"
          done
          # Link — same flags as release.yml
          cc -no-pie main.o $RUNTIME_OBJS \
            -lcurl -lz $(pkg-config --libs openssl 2>/dev/null || echo '-lssl -lcrypto') \
            -o compiler/main
          chmod +x compiler/main

      - name: Run tests
        run: bash tests/run_tests.sh
