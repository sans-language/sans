name: Test

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  test-macos:
    name: Test (macOS ARM64)
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Install LLVM 17
        run: brew install llvm@17

      - name: Download bootstrap compiler
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Use v0.6.1 as bootstrap — recent enough to know all current builtins.
          # v0.4.0 is too old (missing getenv, stof, etc.)
          curl -fsSL "https://github.com/${{ github.repository }}/releases/download/v0.6.1/sans-macos-arm64.tar.gz" | tar xz
          chmod +x sans
          mv sans sans-bootstrap
          ./sans-bootstrap --version

      - name: Build compiler
        run: |
          export PATH="/opt/homebrew/opt/llvm@17/bin:/usr/local/opt/llvm@17/bin:$PATH"
          ./sans-bootstrap build compiler/main.sans

      - name: Run tests
        run: bash tests/run_tests.sh

      - name: Generate .ll files for Linux cross-build
        run: |
          export PATH="/opt/homebrew/opt/llvm@17/bin:/usr/local/opt/llvm@17/bin:$PATH"
          mkdir -p ll-output
          # Use the freshly-built compiler to regenerate .ll files.
          # Instead of intercepting rm during a full build (unreliable),
          # build the compiler to a temp output — the .ll file is written
          # before llc runs, so we capture it mid-build using a background
          # watcher, then compile each runtime module to .ll individually.

          # 1. Capture main.ll: run build in background, copy .ll before rm deletes it
          ./compiler/main build compiler/main.sans -o /tmp/sans_rebuild &
          PID=$!
          # The .ll file path is output_path + ".ll"
          LL_PATH="/tmp/sans_rebuild.ll"
          while [ ! -f "$LL_PATH" ] && kill -0 $PID 2>/dev/null; do sleep 0.05; done
          [ -f "$LL_PATH" ] && cp "$LL_PATH" ll-output/main.ll
          wait $PID 2>/dev/null || true

          # 2. Generate runtime .ll files by building a dummy program that
          #    links each runtime module. The compiler writes runtime .ll to
          #    /tmp/sans_<name>_runtime.ll before llc, then deletes.
          #    Same background + copy approach per module.
          for mod in log result functional array_ext string_ext http server json sock curl map arena rc ssl math fs process; do
            LL="/tmp/sans_${mod}_runtime.ll"
            rm -f "$LL"
          done

          # Run build — runtime .ll files appear in /tmp/
          ./compiler/main build compiler/main.sans -o /tmp/sans_rebuild2 &
          PID=$!
          sleep 1  # Let build start generating runtime .ll files
          CAPTURED=0
          while kill -0 $PID 2>/dev/null; do
            for mod in log result functional array_ext string_ext http server json sock curl map arena rc ssl math fs process; do
              LL="/tmp/sans_${mod}_runtime.ll"
              DEST="ll-output/sans_${mod}_runtime.ll"
              if [ -f "$LL" ] && [ ! -f "$DEST" ]; then
                cp "$LL" "$DEST" 2>/dev/null && CAPTURED=$((CAPTURED+1))
              fi
            done
            sleep 0.1
          done
          # Final sweep for any files created just before exit
          for mod in log result functional array_ext string_ext http server json sock curl map arena rc ssl math fs process; do
            LL="/tmp/sans_${mod}_runtime.ll"
            DEST="ll-output/sans_${mod}_runtime.ll"
            [ -f "$LL" ] && [ ! -f "$DEST" ] && cp "$LL" "$DEST" 2>/dev/null
          done
          wait $PID 2>/dev/null || true

          echo "=== Captured .ll files ==="
          ls -la ll-output/
          echo "Total: $(ls ll-output/*.ll | wc -l) files"

      - name: Upload .ll artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ll-files
          path: ll-output/

  test-linux:
    name: Test (Linux x86_64)
    needs: test-macos
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install LLVM 17 and dependencies
        run: |
          wget -qO- https://apt.llvm.org/llvm-snapshot.gpg.key | sudo tee /etc/apt/keyrings/llvm.asc
          echo "deb [signed-by=/etc/apt/keyrings/llvm.asc] http://apt.llvm.org/jammy/ llvm-toolchain-jammy-17 main" | sudo tee /etc/apt/sources.list.d/llvm-17.list
          sudo apt-get update
          sudo apt-get install -y llvm-17 libcurl4-openssl-dev libssl-dev pkg-config zlib1g-dev

      - name: Download .ll artifacts
        uses: actions/download-artifact@v4
        with:
          name: ll-files
          path: ll-output/

      - name: Compile from LLVM IR
        run: |
          export PATH="/usr/lib/llvm-17/bin:$PATH"
          echo "=== .ll files ==="
          ls -la ll-output/
          # Compile ALL .ll files to .o
          OBJ_FILES=""
          for ll in ll-output/*.ll; do
            base=$(basename "$ll" .ll)
            echo "Compiling: $ll -> /tmp/${base}.o"
            llc -filetype=obj -O2 --relocation-model=pic -o "/tmp/${base}.o" "$ll"
            OBJ_FILES="$OBJ_FILES /tmp/${base}.o"
          done
          echo "Linking: $OBJ_FILES"
          # Link — same flags as release.yml
          cc -no-pie $OBJ_FILES \
            -lcurl -lz $(pkg-config --libs openssl 2>/dev/null || echo '-lssl -lcrypto') \
            -lpthread -lm \
            -o compiler/main
          chmod +x compiler/main

      - name: Run tests
        run: bash tests/run_tests.sh
