name: Fuzz

on:
  schedule:
    # Daily at 3 AM UTC
    - cron: "0 3 * * *"
  workflow_dispatch:
    inputs:
      iterations:
        description: "Number of compiler fuzz iterations"
        required: false
        default: "100000"
      runtime_iterations:
        description: "Number of runtime fuzz iterations"
        required: false
        default: "1000"

permissions:
  contents: read

jobs:
  fuzz-compiler:
    name: Fuzz Compiler (Linux x86_64)
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - uses: actions/checkout@v4

      - name: Install LLVM 17 and dependencies
        run: |
          wget -qO- https://apt.llvm.org/llvm-snapshot.gpg.key | sudo tee /etc/apt/keyrings/llvm.asc
          echo "deb [signed-by=/etc/apt/keyrings/llvm.asc] http://apt.llvm.org/jammy/ llvm-toolchain-jammy-17 main" | sudo tee /etc/apt/sources.list.d/llvm-17.list
          sudo apt-get update
          sudo apt-get install -y llvm-17 libcurl4-openssl-dev libssl-dev pkg-config zlib1g-dev python3

      - name: Download latest Sans release binary
        run: |
          curl -fsSL "https://github.com/${{ github.repository }}/releases/download/v0.8.7/sans-linux-x86_64.tar.gz" | tar xz
          chmod +x sans
          ./sans --version

      - name: Make fuzz scripts executable
        run: chmod +x tools/fuzz/fuzz_compiler.sh

      - name: Run compiler fuzz testing
        env:
          ITERATIONS: ${{ github.event.inputs.iterations || '100000' }}
        run: |
          echo "Running $ITERATIONS compiler fuzz iterations..."
          tools/fuzz/fuzz_compiler.sh "$ITERATIONS" ./sans

      - name: Upload crash artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: fuzz-compiler-crashes-${{ github.run_id }}
          path: |
            tools/fuzz/crashes/
            tools/fuzz/hangs/
          retention-days: 30

  fuzz-runtime:
    name: Fuzz Runtime (Linux x86_64)
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - uses: actions/checkout@v4

      - name: Install LLVM 17 and dependencies
        run: |
          wget -qO- https://apt.llvm.org/llvm-snapshot.gpg.key | sudo tee /etc/apt/keyrings/llvm.asc
          echo "deb [signed-by=/etc/apt/keyrings/llvm.asc] http://apt.llvm.org/jammy/ llvm-toolchain-jammy-17 main" | sudo tee /etc/apt/sources.list.d/llvm-17.list
          sudo apt-get update
          sudo apt-get install -y llvm-17 libcurl4-openssl-dev libssl-dev pkg-config zlib1g-dev python3

      - name: Download latest Sans release binary
        run: |
          curl -fsSL "https://github.com/${{ github.repository }}/releases/download/v0.8.7/sans-linux-x86_64.tar.gz" | tar xz
          chmod +x sans
          ./sans --version

      - name: Make fuzz scripts executable
        run: chmod +x tools/fuzz/fuzz_runtime.sh

      - name: Run runtime fuzz testing
        env:
          ITERATIONS: ${{ github.event.inputs.runtime_iterations || '1000' }}
        run: |
          echo "Running $ITERATIONS runtime fuzz iterations..."
          tools/fuzz/fuzz_runtime.sh "$ITERATIONS" ./sans

      - name: Upload crash artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: fuzz-runtime-crashes-${{ github.run_id }}
          path: |
            tools/fuzz/crashes/
            tools/fuzz/hangs/
          retention-days: 30
