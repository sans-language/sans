name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Test build only (no release publish)'
        type: boolean
        default: true

permissions:
  contents: write

jobs:
  version-bump:
    name: Bump version files
    if: ${{ !inputs.dry_run }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.dry_run && github.ref || 'main' }}
          token: ${{ secrets.RELEASE_TOKEN }}

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Update version in all files
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          sed -i "s/\"version\": \".*\"/\"version\": \"${VERSION}\"/" editors/vscode-sans/package.json
          for html in website/index.html website/docs/index.html website/download/index.html website/play/index.html; do
            sed -i "s/content=\"[0-9][0-9a-zA-Z.\-]*\"/content=\"${VERSION}\"/" "$html"
          done
          sed -i "s/\*\*Current version: \`[0-9][0-9a-zA-Z.\-]*\`\*\*/\*\*Current version: \`${VERSION}\`\*\*/" CLAUDE.md
          sed -i "s/p(\"sans [0-9][0-9a-zA-Z.\-]*\")/p(\"sans ${VERSION}\")/" compiler/main.sans
          # Update ai-reference.md version header
          sed -i "s/^# Sans AI Reference — v[0-9][0-9a-zA-Z.\-]*/# Sans AI Reference — v${VERSION}/" docs/ai-reference.md
          # Update llms.txt version header
          sed -i "s/^# Sans Programming Language — v[0-9][0-9a-zA-Z.\-]*/# Sans Programming Language — v${VERSION}/" website/llms.txt

      - name: Commit version bump
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --quiet && echo "No changes to commit" && exit 0
          git commit -m "chore: bump version to '${VERSION}'"
          git push origin main

  build-macos:
    name: Build macOS ARM64
    needs: version-bump
    if: ${{ always() && (needs.version-bump.result == 'success' || needs.version-bump.result == 'skipped') }}
    runs-on: macos-15

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.dry_run && github.ref || 'main' }}

      - name: Install LLVM 17
        run: brew install llvm@17

      - name: Download bootstrap compiler
        run: |
          # Use latest release as bootstrap — must know Result<T> unwrap (!)
          # and all builtins up to the previous release.
          curl -fsSL "https://github.com/${{ github.repository }}/releases/latest/download/sans-macos-arm64.tar.gz" | tar xz
          chmod +x sans
          ./sans --version

      - name: Build self-hosted compiler
        run: |
          export PATH="/opt/homebrew/opt/llvm@17/bin:/usr/local/opt/llvm@17/bin:$PATH"
          echo "=== Bootstrap version ==="
          ./sans --version
          echo "=== Stage 1: Build with stubbed runtime (bootstrap may lack new builtins) ==="
          cp runtime/server.sans runtime/server.sans.bak
          cp runtime/ssl.sans runtime/ssl.sans.bak
          sed -i.tmp 's/pmutex_init(sans_worker_mutex)/0/g; s/pmutex_lock(sans_worker_mutex)/0/g; s/pmutex_unlock(sans_worker_mutex)/0/g' runtime/server.sans
          sed -i.tmp 's/pmutex_init(sans_ssl_worker_mutex)/0/g; s/pmutex_lock(sans_ssl_worker_mutex)/0/g; s/pmutex_unlock(sans_ssl_worker_mutex)/0/g' runtime/ssl.sans
          ./sans build compiler/main.sans
          cp runtime/server.sans.bak runtime/server.sans
          cp runtime/ssl.sans.bak runtime/ssl.sans
          rm -f runtime/server.sans.bak runtime/ssl.sans.bak runtime/server.sans.tmp runtime/ssl.sans.tmp
          echo "=== Stage 2: Rebuild with stage-1 compiler (captures .ll for Linux) ==="
          mkdir -p ll-output /tmp/wrap
          printf '#!/bin/bash\nARGS=()\nfor f in "$@"; do [[ "$f" == *.ll ]] || ARGS+=("$f"); done\n[ ${#ARGS[@]} -gt 0 ] && exec /bin/rm "${ARGS[@]}"\n' > /tmp/wrap/rm
          chmod +x /tmp/wrap/rm
          PATH="/tmp/wrap:$PATH" ./compiler/main build compiler/main.sans
          # Collect .ll files
          echo "=== .ll files in /tmp/ ==="
          ls -la /tmp/sans_*_runtime.ll 2>/dev/null || echo "no runtime .ll files in /tmp"
          ls -la /tmp/sans_curl* 2>/dev/null || echo "no curl files in /tmp"
          [ -f compiler/main.ll ] && mv compiler/main.ll ll-output/main.ll
          for f in /tmp/sans_*_runtime.ll; do
            [ -f "$f" ] && cp "$f" ll-output/
          done
          echo "=== Captured .ll files ==="
          ls -la ll-output/
          echo "=== Verify compiler built ==="
          ls -la compiler/main
          ./compiler/main --version
          # Fix dylib paths for portability — use @rpath so binary works with any Homebrew prefix
          echo "=== Before rpath fix ==="
          otool -L compiler/main | grep -E "ssl|crypto"
          for lib in libssl.3.dylib libcrypto.3.dylib; do
            old=$(otool -L compiler/main | grep "$lib" | sed 's/^[[:space:]]*//' | cut -d' ' -f1)
            echo "Fixing: $old -> @rpath/$lib"
            if [ -n "$old" ] && [ "$old" != "@rpath/$lib" ]; then
              install_name_tool -change "$old" "@rpath/$lib" compiler/main
            fi
          done
          install_name_tool -add_rpath /opt/homebrew/opt/openssl@3/lib compiler/main 2>/dev/null || true
          install_name_tool -add_rpath /usr/local/opt/openssl@3/lib compiler/main 2>/dev/null || true
          install_name_tool -add_rpath /usr/local/lib compiler/main 2>/dev/null || true
          # Same for libcurl
          curl_old=$(otool -L compiler/main | grep "libcurl" | sed 's/^[[:space:]]*//' | cut -d' ' -f1)
          if [ -n "$curl_old" ] && echo "$curl_old" | grep -q homebrew; then
            install_name_tool -change "$curl_old" "@rpath/libcurl.4.dylib" compiler/main
          fi
          echo "=== After rpath fix ==="
          otool -L compiler/main | grep -E "ssl|crypto|curl|rpath"
          # NOTE: Do NOT strip the binary — strip can corrupt self-hosted compiler binaries

      - name: Verify binary
        run: |
          ./compiler/main --version
          file compiler/main
          otool -L compiler/main

      - name: Smoke test
        run: |
          echo 'main() I { p("smoke test ok") 0 }' > /tmp/smoke.sans
          ./compiler/main build /tmp/smoke.sans
          /tmp/smoke
          echo "Smoke test passed"

      - name: Upload .ll artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ll-files
          path: ll-output/

      - name: Package
        run: |
          mv compiler/main sans
          tar czf sans-macos-arm64.tar.gz sans
          rm sans

      - name: Upload release asset
        if: ${{ !inputs.dry_run }}
        uses: softprops/action-gh-release@v2
        with:
          files: sans-macos-arm64.tar.gz
          generate_release_notes: true

  build-linux:
    name: Build Linux x86_64
    needs: build-macos
    if: ${{ always() && needs.build-macos.result == 'success' }}
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.dry_run && github.ref || 'main' }}

      - name: Install LLVM 17 and dependencies
        run: |
          wget -qO- https://apt.llvm.org/llvm-snapshot.gpg.key | sudo apt-key add -
          echo "deb http://apt.llvm.org/jammy/ llvm-toolchain-jammy-17 main" | sudo tee /etc/apt/sources.list.d/llvm-17.list
          sudo apt-get update
          sudo apt-get install -y llvm-17 libcurl4-openssl-dev libssl-dev pkg-config zlib1g-dev

      - name: Download .ll artifacts
        uses: actions/download-artifact@v4
        with:
          name: ll-files
          path: ll-output/

      - name: Compile from LLVM IR
        run: |
          export PATH="/usr/lib/llvm-17/bin:$PATH"
          echo "=== .ll files ==="
          ls -la ll-output/
          # Compile main .ll to object
          llc -filetype=obj -O2 --relocation-model=pic -o main.o ll-output/main.ll
          # Compile each runtime .ll to object
          RUNTIME_OBJS=""
          for ll in ll-output/sans_*_runtime.ll; do
            base=$(basename "$ll" .ll)
            llc -filetype=obj -O2 --relocation-model=pic -o "/tmp/${base}.o" "$ll"
            RUNTIME_OBJS="$RUNTIME_OBJS /tmp/${base}.o"
          done
          # Link
          cc -no-pie main.o $RUNTIME_OBJS \
            -lcurl -lz $(pkg-config --libs openssl 2>/dev/null || echo '-lssl -lcrypto') \
            -o sans
          strip sans

      - name: Verify binary
        run: |
          ./sans --version
          file sans
          ldd sans

      - name: Package
        run: |
          tar czf sans-linux-x86_64.tar.gz sans
          rm sans

      - name: Upload release asset
        if: ${{ !inputs.dry_run }}
        uses: softprops/action-gh-release@v2
        with:
          files: sans-linux-x86_64.tar.gz

  build-windows:
    name: Build Windows x86_64
    needs: build-macos
    if: ${{ always() && needs.build-macos.result == 'success' }}
    runs-on: windows-latest

    defaults:
      run:
        shell: msys2 {0}

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.dry_run && github.ref || 'main' }}

      - uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          install: >-
            mingw-w64-x86_64-llvm
            mingw-w64-x86_64-clang
            mingw-w64-x86_64-curl
            mingw-w64-x86_64-openssl
            mingw-w64-x86_64-zlib
            mingw-w64-x86_64-winpthreads-git
            pkg-config

      - name: Download .ll artifacts
        uses: actions/download-artifact@v4
        with:
          name: ll-files
          path: ll-output/

      - name: Compile from LLVM IR
        run: |
          echo "=== .ll files ==="
          ls -la ll-output/
          echo "=== LLVM version ==="
          llc --version | head -2

          # Compile main .ll to object
          llc -filetype=obj -O2 -o main.o ll-output/main.ll

          # Compile each runtime .ll to object
          RUNTIME_OBJS=""
          for ll in ll-output/sans_*_runtime.ll; do
            base=$(basename "$ll" .ll)
            llc -filetype=obj -O2 -o "/tmp/${base}.o" "$ll"
            RUNTIME_OBJS="$RUNTIME_OBJS /tmp/${base}.o"
          done

          # Compile Windows compatibility shim (poll -> WSAPoll)
          cc -c -o /tmp/win_compat.o runtime/win_compat.c

          # Link with MinGW — provides pthreads, POSIX socket compat, etc.
          cc main.o $RUNTIME_OBJS /tmp/win_compat.o \
            $(pkg-config --libs libcurl openssl zlib 2>/dev/null || echo '-lcurl -lssl -lcrypto -lz') \
            -lpthread -lws2_32 \
            -o sans.exe

          strip sans.exe

      - name: Verify binary
        run: |
          ./sans.exe --version
          file sans.exe

      - name: Smoke test
        run: |
          echo 'main() I { p("smoke test ok") 0 }' > /tmp/smoke.sans
          ./sans.exe build /tmp/smoke.sans
          /tmp/smoke.exe
          echo "Smoke test passed"

      - name: Package
        run: |
          tar czf sans-windows-x86_64.tar.gz sans.exe
          rm sans.exe

      - name: Upload release asset
        if: ${{ !inputs.dry_run }}
        uses: softprops/action-gh-release@v2
        with:
          files: sans-windows-x86_64.tar.gz
