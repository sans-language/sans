name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Test build only (no release publish)'
        type: boolean
        default: true

permissions:
  contents: write

jobs:
  version-bump:
    name: Bump version files
    if: ${{ !inputs.dry_run }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.dry_run && github.ref || 'main' }}
          token: ${{ secrets.RELEASE_TOKEN }}

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Update version in all files
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          sed -i "s/\"version\": \".*\"/\"version\": \"${VERSION}\"/" editors/vscode-sans/package.json
          for html in website/index.html website/docs/index.html website/benchmarks/index.html website/download/index.html; do
            sed -i "s/content=\"[0-9]*\.[0-9]*\.[0-9]*\"/content=\"${VERSION}\"/" "$html"
          done
          sed -i "s/\*\*Current version: \`[0-9]*\.[0-9]*\.[0-9]*\`\*\*/\*\*Current version: \`${VERSION}\`\*\*/" CLAUDE.md
          sed -i "s/p(\"sans [0-9]*\.[0-9]*\.[0-9]*\")/p(\"sans ${VERSION}\")/" compiler/main.sans

      - name: Commit version bump
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --quiet && echo "No changes to commit" && exit 0
          git commit -m "chore: bump version to ${VERSION}"
          git push origin main

  build-macos:
    name: Build macOS ARM64
    needs: version-bump
    if: ${{ always() && (needs.version-bump.result == 'success' || needs.version-bump.result == 'skipped') }}
    runs-on: macos-15

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.dry_run && github.ref || 'main' }}

      - name: Install LLVM 17
        run: brew install llvm@17

      - name: Download bootstrap compiler
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Try previous release first, fall back to v0.4.0
          PREV_TAG=$(gh release list --limit 2 --json tagName -q '.[1].tagName' 2>/dev/null || echo "")
          if [ -n "$PREV_TAG" ]; then
            echo "Using previous release ${PREV_TAG} as bootstrap"
            curl -fsSL "https://github.com/${{ github.repository }}/releases/download/${PREV_TAG}/sans-macos-arm64.tar.gz" | tar xz || {
              echo "Previous release download failed, falling back to v0.4.0"
              curl -fsSL "https://github.com/${{ github.repository }}/releases/download/v0.4.0/sans-macos-arm64.tar.gz" | tar xz
            }
          else
            echo "No previous release found, using v0.4.0"
            curl -fsSL "https://github.com/${{ github.repository }}/releases/download/v0.4.0/sans-macos-arm64.tar.gz" | tar xz
          fi
          chmod +x sans
          ./sans --version

      - name: Build self-hosted compiler
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          export PATH="/opt/homebrew/opt/llvm@17/bin:/usr/local/opt/llvm@17/bin:$PATH"
          # Try direct build first. If the bootstrap segfaults (new builtins the
          # old compiler can't handle), do a two-stage build: download the
          # previous release source, build that with the bootstrap to get an
          # intermediate compiler, then build the current source with it.
          if ./sans build compiler/main.sans 2>&1; then
            echo "=== Direct build succeeded ==="
          else
            echo "=== Direct build failed, doing two-stage bootstrap ==="
            PREV_TAG=$(gh release list --limit 2 --json tagName -q '.[1].tagName' 2>/dev/null || echo "")
            if [ -z "$PREV_TAG" ]; then
              echo "No previous release tag found for stage 1"
              exit 1
            fi
            echo "Stage 1: building from ${PREV_TAG} source with bootstrap"
            mkdir -p /tmp/prev-src
            curl -fsSL "https://github.com/${{ github.repository }}/archive/refs/tags/${PREV_TAG}.tar.gz" | tar xz -C /tmp/prev-src --strip-components=1
            ./sans build /tmp/prev-src/compiler/main.sans
            mv /tmp/prev-src/compiler/main /tmp/sans-stage1
            rm -rf /tmp/prev-src
            echo "Stage 2: building current source with stage 1 compiler"
            /tmp/sans-stage1 build compiler/main.sans
          fi
          # Fix dylib paths for portability — use @rpath so binary works with any Homebrew prefix
          echo "=== Before rpath fix ==="
          otool -L compiler/main | grep -E "ssl|crypto"
          for lib in libssl.3.dylib libcrypto.3.dylib; do
            old=$(otool -L compiler/main | grep "$lib" | sed 's/^[[:space:]]*//' | cut -d' ' -f1)
            echo "Fixing: $old -> @rpath/$lib"
            if [ -n "$old" ] && [ "$old" != "@rpath/$lib" ]; then
              install_name_tool -change "$old" "@rpath/$lib" compiler/main
            fi
          done
          install_name_tool -add_rpath /opt/homebrew/opt/openssl@3/lib compiler/main 2>/dev/null || true
          install_name_tool -add_rpath /usr/local/opt/openssl@3/lib compiler/main 2>/dev/null || true
          install_name_tool -add_rpath /usr/local/lib compiler/main 2>/dev/null || true
          # Same for libcurl
          curl_old=$(otool -L compiler/main | grep "libcurl" | sed 's/^[[:space:]]*//' | cut -d' ' -f1)
          if [ -n "$curl_old" ] && echo "$curl_old" | grep -q homebrew; then
            install_name_tool -change "$curl_old" "@rpath/libcurl.4.dylib" compiler/main
          fi
          echo "=== After rpath fix ==="
          otool -L compiler/main | grep -E "ssl|crypto|curl|rpath"
          # NOTE: Do NOT strip the binary — strip can corrupt self-hosted compiler binaries

      - name: Verify binary
        run: |
          ./compiler/main --version
          file compiler/main
          otool -L compiler/main

      - name: Smoke test
        run: |
          echo 'main() I { p("smoke test ok") 0 }' > /tmp/smoke.sans
          ./compiler/main build /tmp/smoke.sans
          /tmp/smoke
          echo "Smoke test passed"

      - name: Generate .ll files for Linux cross-build
        run: |
          export PATH="/opt/homebrew/opt/llvm@17/bin:/usr/local/opt/llvm@17/bin:$PATH"
          # Use the freshly built compiler (no hardcoded target triple).
          # The compiler deletes .ll files after llc runs. Replace rm with
          # a script that copies .ll files before deleting them.
          mkdir -p ll-output /tmp/wrap
          printf '#!/bin/bash\nfor f in "$@"; do [[ "$f" == *.ll ]] && cp "$f" '"$(pwd)"'/ll-output/ 2>/dev/null; done\nexec /bin/rm "$@"\n' > /tmp/wrap/rm
          chmod +x /tmp/wrap/rm
          PATH="/tmp/wrap:$PATH" ./compiler/main build compiler/main.sans 2>&1 || true
          echo "Generated .ll files:"
          ls -la ll-output/

      - name: Upload .ll artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ll-files
          path: ll-output/

      - name: Package
        run: |
          mv compiler/main sans
          tar czf sans-macos-arm64.tar.gz sans
          rm sans

      - name: Upload release asset
        if: ${{ !inputs.dry_run }}
        uses: softprops/action-gh-release@v2
        with:
          files: sans-macos-arm64.tar.gz
          generate_release_notes: true

  build-linux:
    name: Build Linux x86_64
    needs: build-macos
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.dry_run && github.ref || 'main' }}

      - name: Install LLVM 17 and dependencies
        run: |
          wget -qO- https://apt.llvm.org/llvm-snapshot.gpg.key | sudo apt-key add -
          echo "deb http://apt.llvm.org/jammy/ llvm-toolchain-jammy-17 main" | sudo tee /etc/apt/sources.list.d/llvm-17.list
          sudo apt-get update
          sudo apt-get install -y llvm-17 libcurl4-openssl-dev libssl-dev pkg-config zlib1g-dev

      - name: Download .ll artifacts
        uses: actions/download-artifact@v4
        with:
          name: ll-files
          path: ll-output/

      - name: Compile from LLVM IR
        run: |
          export PATH="/usr/lib/llvm-17/bin:$PATH"
          echo "=== .ll files ==="
          ls -la ll-output/
          # Compile main .ll to object
          llc -filetype=obj -O2 --relocation-model=pic -o main.o ll-output/main.ll
          # Compile each runtime .ll to object
          RUNTIME_OBJS=""
          for ll in ll-output/sans_*_runtime.ll; do
            base=$(basename "$ll" .ll)
            llc -filetype=obj -O2 --relocation-model=pic -o "/tmp/${base}.o" "$ll"
            RUNTIME_OBJS="$RUNTIME_OBJS /tmp/${base}.o"
          done
          # Link
          cc -no-pie main.o $RUNTIME_OBJS \
            -lcurl -lz $(pkg-config --libs openssl 2>/dev/null || echo '-lssl -lcrypto') \
            -o sans
          strip sans

      - name: Verify binary
        run: |
          ./sans --version
          file sans
          ldd sans

      - name: Package
        run: |
          tar czf sans-linux-x86_64.tar.gz sans
          rm sans

      - name: Upload release asset
        if: ${{ !inputs.dry_run }}
        uses: softprops/action-gh-release@v2
        with:
          files: sans-linux-x86_64.tar.gz
