name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  version-bump:
    name: Bump version files
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Update version in all files
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          # VS Code extension
          sed -i "s/\"version\": \".*\"/\"version\": \"${VERSION}\"/" editors/vscode-sans/package.json

          # Website version meta tags
          for html in website/index.html website/docs/index.html website/benchmarks/index.html website/download/index.html; do
            sed -i "s/content=\"[0-9]*\.[0-9]*\.[0-9]*\"/content=\"${VERSION}\"/" "$html"
          done

          # CLAUDE.md current version
          sed -i "s/\*\*Current version: \`[0-9]*\.[0-9]*\.[0-9]*\`\*\*/\*\*Current version: \`${VERSION}\`\*\*/" CLAUDE.md

          # Self-hosted compiler version string
          sed -i "s/p(\"sans [0-9]*\.[0-9]*\.[0-9]*\")/p(\"sans ${VERSION}\")/" compiler/main.sans

      - name: Commit version bump
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --quiet && echo "No changes to commit" && exit 0
          git commit -m "chore: bump version to ${VERSION}"
          git push origin main

  build-macos:
    name: Build macOS ARM64
    needs: version-bump
    runs-on: macos-15

    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - name: Install LLVM 17
        run: brew install llvm@17

      - name: Download bootstrap compiler
        run: |
          curl -fsSL https://github.com/sans-language/sans/releases/download/v0.4.0/sans-macos-arm64.tar.gz | tar xz
          chmod +x sans
          ./sans --version

      - name: Build self-hosted compiler
        run: |
          export PATH="/opt/homebrew/opt/llvm@17/bin:/usr/local/opt/llvm@17/bin:$PATH"
          ./sans build compiler/main.sans
          strip compiler/main

      - name: Verify binary
        run: |
          ./compiler/main --version
          file compiler/main
          otool -L compiler/main

      - name: Package
        run: |
          mv compiler/main sans
          tar czf sans-macos-arm64.tar.gz sans
          rm sans

      - name: Upload release asset
        uses: softprops/action-gh-release@v2
        with:
          files: sans-macos-arm64.tar.gz
          generate_release_notes: true

  build-ll:
    name: Generate LLVM IR
    needs: version-bump
    runs-on: macos-15

    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - name: Install LLVM 17
        run: brew install llvm@17

      - name: Download bootstrap compiler
        run: |
          curl -fsSL https://github.com/sans-language/sans/releases/download/v0.4.0/sans-macos-arm64.tar.gz | tar xz
          chmod +x sans

      - name: Generate .ll files
        run: |
          export PATH="/opt/homebrew/opt/llvm@17/bin:/usr/local/opt/llvm@17/bin:$PATH"
          # Patch do_link to keep .ll files: compile but don't link
          # Instead, manually run the compiler and capture .ll output
          # The compiler writes .ll then calls llc then links — we just need the .ll
          # Use a fake llc that just succeeds so compilation finishes and .ll is preserved
          mkdir -p /tmp/fakebin
          printf '#!/bin/bash\nexit 0\n' > /tmp/fakebin/llc
          printf '#!/bin/bash\nexit 0\n' > /tmp/fakebin/cc
          chmod +x /tmp/fakebin/llc /tmp/fakebin/cc
          export PATH="/tmp/fakebin:$PATH"
          ./sans build compiler/main.sans 2>&1 || true
          # Collect all .ll files
          mkdir -p ll-output
          cp /tmp/sans_*_runtime.ll ll-output/ 2>/dev/null || true
          cp compiler/main.ll ll-output/ 2>/dev/null || true
          # Also try the default output path
          find /tmp -name "*.ll" -newer /tmp/fakebin/llc -exec cp {} ll-output/ \; 2>/dev/null || true
          ls -la ll-output/

      - name: Upload .ll artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ll-files
          path: ll-output/

  build-linux:
    name: Build Linux x86_64
    needs: build-ll
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - name: Install LLVM 17
        run: |
          wget -qO- https://apt.llvm.org/llvm-snapshot.gpg.key | sudo apt-key add -
          echo "deb http://apt.llvm.org/jammy/ llvm-toolchain-jammy-17 main" | sudo tee /etc/apt/sources.list.d/llvm-17.list
          sudo apt-get update
          sudo apt-get install -y llvm-17 libcurl4-openssl-dev libssl-dev pkg-config zlib1g-dev

      - name: Download .ll artifacts
        uses: actions/download-artifact@v4
        with:
          name: ll-files
          path: ll-output/

      - name: Compile from LLVM IR
        run: |
          export PATH="/usr/lib/llvm-17/bin:$PATH"
          ls -la ll-output/
          # Compile main .ll to object
          llc -filetype=obj -O2 -o compiler/main.o ll-output/main.ll
          # Compile each runtime .ll to object
          RUNTIME_OBJS=""
          for ll in ll-output/sans_*_runtime.ll; do
            base=$(basename "$ll" .ll)
            llc -filetype=obj -O2 -o "/tmp/${base}.o" "$ll"
            RUNTIME_OBJS="$RUNTIME_OBJS /tmp/${base}.o"
          done
          # Link
          cc compiler/main.o $RUNTIME_OBJS \
            -lcurl -lz $(pkg-config --libs openssl 2>/dev/null || echo '-lssl -lcrypto') \
            -Wl,-z,stacksize=268435456 \
            -o compiler/main
          strip compiler/main

      - name: Verify binary
        run: |
          ./compiler/main --version
          file compiler/main
          ldd compiler/main

      - name: Package
        run: |
          mv compiler/main sans
          tar czf sans-linux-x86_64.tar.gz sans
          rm sans

      - name: Upload release asset
        uses: softprops/action-gh-release@v2
        with:
          files: sans-linux-x86_64.tar.gz
