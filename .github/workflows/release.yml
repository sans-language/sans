name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  version-bump:
    name: Bump version files
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Update version in all files
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          # VS Code extension
          sed -i "s/\"version\": \".*\"/\"version\": \"${VERSION}\"/" editors/vscode-sans/package.json

          # Website version meta tags
          for html in website/index.html website/docs/index.html website/benchmarks/index.html website/download/index.html; do
            sed -i "s/content=\"[0-9]*\.[0-9]*\.[0-9]*\"/content=\"${VERSION}\"/" "$html"
          done

          # CLAUDE.md current version
          sed -i "s/\*\*Current version: \`[0-9]*\.[0-9]*\.[0-9]*\`\*\*/\*\*Current version: \`${VERSION}\`\*\*/" CLAUDE.md

          # Self-hosted compiler version string
          sed -i "s/p(\"sans [0-9]*\.[0-9]*\.[0-9]*\")/p(\"sans ${VERSION}\")/" compiler/main.sans

      - name: Commit version bump
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --quiet && echo "No changes to commit" && exit 0
          git commit -m "chore: bump version to ${VERSION}"
          git push origin main

  build-macos:
    name: Build macOS ARM64
    needs: version-bump
    runs-on: macos-15

    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - name: Install LLVM 17
        run: brew install llvm@17

      - name: Download bootstrap compiler
        run: |
          curl -fsSL https://github.com/sans-language/sans/releases/latest/download/sans-macos-arm64.tar.gz | tar xz
          chmod +x sans
          ./sans --version

      - name: Build self-hosted compiler
        run: |
          ./sans build compiler/main.sans
          strip compiler/main

      - name: Verify binary
        run: |
          ./compiler/main --version
          file compiler/main
          otool -L compiler/main

      - name: Package
        run: |
          mv compiler/main sans
          tar czf sans-macos-arm64.tar.gz sans
          rm sans

      - name: Upload release asset
        uses: softprops/action-gh-release@v2
        with:
          files: sans-macos-arm64.tar.gz
          generate_release_notes: true

  build-linux:
    name: Build Linux x86_64
    needs: version-bump
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - name: Install LLVM 17
        run: |
          wget -qO- https://apt.llvm.org/llvm-snapshot.gpg.key | sudo apt-key add -
          echo "deb http://apt.llvm.org/jammy/ llvm-toolchain-jammy-17 main" | sudo tee /etc/apt/sources.list.d/llvm-17.list
          sudo apt-get update
          sudo apt-get install -y llvm-17 libcurl4-openssl-dev libssl-dev pkg-config

      - name: Download bootstrap compiler
        run: |
          curl -fsSL https://github.com/sans-language/sans/releases/latest/download/sans-linux-x86_64.tar.gz | tar xz
          chmod +x sans
          export PATH="/usr/lib/llvm-17/bin:$PATH"
          ./sans --version

      - name: Build self-hosted compiler
        run: |
          export PATH="/usr/lib/llvm-17/bin:$PATH"
          ./sans build compiler/main.sans
          strip compiler/main

      - name: Verify binary
        run: |
          ./compiler/main --version
          file compiler/main
          ldd compiler/main

      - name: Package
        run: |
          mv compiler/main sans
          tar czf sans-linux-x86_64.tar.gz sans
          rm sans

      - name: Upload release asset
        uses: softprops/action-gh-release@v2
        with:
          files: sans-linux-x86_64.tar.gz
